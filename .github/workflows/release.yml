
name: Build and Release Multicultivator

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          RAW="${GITHUB_REF_NAME}"
          if [[ "$RAW" == v* ]]; then
            VERSION="${RAW#v}"
            INFO="$RAW"
          else
            VERSION="1.0.0"
            INFO="1.0.0"
          fi
          echo "raw=$INFO" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Publish macOS arm64 app with release version
        run: dotnet publish src/App/App.fsproj -c Release -r osx-arm64 --self-contained true -p:Version=${{ steps.version.outputs.version }} -p:InformationalVersion=${{ steps.version.outputs.raw }} -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 -p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Make macOS arm64 scripts executable
        run: |
          chmod +x packaging/macOS_arm64/build_app.sh
          chmod +x packaging/macOS_arm64/build_dmg.sh
          chmod +x packaging/macOS_arm64/build_pkg.sh

      - name: Build macOS arm64 app
        run: packaging/macOS_arm64/build_app.sh "${{ steps.version.outputs.version }}"

      - name: Build macOS arm64 dmg
        run: |
          packaging/macOS_arm64/build_dmg.sh

      - name: Build macOS arm64 pkg
        run: packaging/macOS_arm64/build_pkg.sh "${{ steps.version.outputs.version }}"

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multicultivator-macos-arm64
          path: |
            releases/Multicultivator-macos-arm64.dmg
            releases/Multicultivator-macos-arm64.pkg

  build-macos-x64:
    name: macOS x64
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          RAW="${GITHUB_REF_NAME}"
          if [[ "$RAW" == v* ]]; then
            VERSION="${RAW#v}"
            INFO="$RAW"
          else
            VERSION="1.0.0"
            INFO="1.0.0"
          fi
          echo "raw=$INFO" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Publish macOS x64 app with release version
        run: dotnet publish src/App/App.fsproj -c Release -r osx-x64 --self-contained true -p:Version=${{ steps.version.outputs.version }} -p:InformationalVersion=${{ steps.version.outputs.raw }} -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 -p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Make macOS x64 scripts executable
        run: |
          chmod +x packaging/macOS_x64/build_app.sh
          chmod +x packaging/macOS_x64/build_dmg.sh
          chmod +x packaging/macOS_x64/build_pkg.sh

      - name: Build macOS x64 app
        run: packaging/macOS_x64/build_app.sh "${{ steps.version.outputs.version }}"

      - name: Build macOS x64 dmg
        run: |
          packaging/macOS_x64/build_dmg.sh

      - name: Build macOS x64 pkg
        run: packaging/macOS_x64/build_pkg.sh "${{ steps.version.outputs.version }}"

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multicultivator-macos-x64
          path: |
            releases/Multicultivator-macos-x64.dmg
            releases/Multicultivator-macos-x64.pkg

  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          RAW="${GITHUB_REF_NAME}"
          if [[ "$RAW" == v* ]]; then
            VERSION="${RAW#v}"
            INFO="$RAW"
          else
            VERSION="1.0.0"
            INFO="1.0.0"
          fi
          echo "raw=$INFO" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Windows app
        run: dotnet publish src/App/App.fsproj -c Release -r win-x64 --self-contained true -p:Version=${{ steps.version.outputs.version }} -p:InformationalVersion=${{ steps.version.outputs.raw }} -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 -p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Create Inno Setup script
        shell: powershell
        run: |
          @"
          [Setup]
          AppName=Multicultivator
          AppVersion=${{ steps.version.outputs.version }}
          DefaultDirName={autopf}\Multicultivator
          DefaultGroupName=Multicultivator
          OutputDir=..\..\releases
          OutputBaseFilename=MulticultivatorSetup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          SetupIconFile=..\..\src\App\Assets\app_icon.ico
          UninstallDisplayIcon={app}\Multicultivator.exe

          [Files]
          Source: "..\..\src\App\bin\Release\net8.0\win-x64\publish\*"; DestDir: "{app}"; Flags: recursesubdirs ignoreversion

          [Tasks]
          Name: "desktopicon"; Description: "Create a &desktop icon"; GroupDescription: "Additional icons:"; Flags: checkedonce

          [Icons]
          Name: "{group}\Multicultivator"; Filename: "{app}\Multicultivator.exe"
          Name: "{autodesktop}\Multicultivator"; Filename: "{app}\Multicultivator.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Multicultivator.exe"; Description: "Launch Multicultivator"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content packaging\windows_x64\multicultivator.generated.iss

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: powershell
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows_x64\multicultivator.generated.iss'

      - name: Zip Windows publish folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          Compress-Archive -Path src/App/bin/Release/net8.0/win-x64/publish/* -DestinationPath releases/Multicultivator-win-x64.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multicultivator-windows-x64
          path: |
            releases/MulticultivatorSetup.exe
            releases/Multicultivator-win-x64.zip

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          RAW="${GITHUB_REF_NAME}"
          if [[ "$RAW" == v* ]]; then
            VERSION="${RAW#v}"
            INFO="$RAW"
          else
            VERSION="1.0.0"
            INFO="1.0.0"
          fi
          echo "raw=$INFO" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Linux app
        run: dotnet publish src/App/App.fsproj -c Release -r linux-x64 --self-contained true -p:Version=${{ steps.version.outputs.version }} -p:InformationalVersion=${{ steps.version.outputs.raw }} -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 -p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Create Linux archive
        run: |
          mkdir -p releases
          tar -czvf releases/Multicultivator-linux.tar.gz -C src/App/bin/Release/net8.0/linux-x64/publish .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: multicultivator-linux
          path: releases/Multicultivator-linux.tar.gz

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos-arm64
      - build-macos-x64
      - build-windows
      - build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: multicultivator-macos-arm64
          path: release-files/macos-arm64

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: multicultivator-macos-x64
          path: release-files/macos-x64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: multicultivator-windows-x64
          path: release-files/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: multicultivator-linux
          path: release-files/linux

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/macos-arm64/Multicultivator-macos-arm64.dmg
            release-files/macos-arm64/Multicultivator-macos-arm64.pkg
            release-files/macos-x64/Multicultivator-macos-x64.dmg
            release-files/macos-x64/Multicultivator-macos-x64.pkg
            release-files/windows/MulticultivatorSetup.exe
            release-files/windows/Multicultivator-win-x64.zip
            release-files/linux/Multicultivator-linux.tar.gz